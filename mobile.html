<!DOCTYPE html>
<html lang="lv">
<head>
<!-- Dark first paint: prevents white flash on PWA wake/reload. -->
<style>html{background:#000;}body{background:#000;}</style>
<script>
(function() {
  var API_BASE = 'https://minka-api.gamernr1elite.workers.dev';
  var TOKEN_KEY = 'minka_api_token_v1';
  var AUTO_PW_KEY = 'pw';

  function getToken() {
    try { return sessionStorage.getItem(TOKEN_KEY) || localStorage.getItem(TOKEN_KEY) || ''; }
    catch (_e) { return ''; }
  }

  function setToken(token, persist) {
    try {
      sessionStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(TOKEN_KEY);
      if (token) {
        if (persist) localStorage.setItem(TOKEN_KEY, token);
        else sessionStorage.setItem(TOKEN_KEY, token);
      }
    } catch (_e) {}
  }

  var CALENDAR_BUILD = '20260715j';

  function withCalendarBuild(url) {
    try {
      var u = new URL(url, window.location.href);
      u.searchParams.set('cv', CALENDAR_BUILD);
      return u.pathname + u.search + u.hash;
    } catch (_e) {
      var join = url.indexOf('?') >= 0 ? '&' : '?';
      return url + join + 'cv=' + encodeURIComponent(CALENDAR_BUILD);
    }
  }

  function notifyIframeAuth() {
    function sendAuth() {
      var f = document.getElementById('calIframe');
      if (!f) return;
      var token = getToken();
      if (!token) return;
      var base = withCalendarBuild(f.getAttribute('data-base-src') || 'kalendars/index.html');
      var next = base;
      if (f.getAttribute('src') !== next) f.setAttribute('src', next);
      if (f.contentWindow) f.contentWindow.postMessage({ type: 'minka_auth_ok', token: token }, window.location.origin);
    }
    var frame = document.getElementById('calIframe');
    if (frame) frame.addEventListener('load', sendAuth, { once: true });
    setTimeout(sendAuth, 0);
    setTimeout(sendAuth, 250);
    setTimeout(sendAuth, 900);
  }

  function stripAutoLoginParam() {
    try {
      var url = new URL(window.location.href);
      if (!url.searchParams.has(AUTO_PW_KEY) && !url.searchParams.has('pair')) return;
      url.searchParams.delete(AUTO_PW_KEY);
      url.searchParams.delete('pair');
      history.replaceState({}, '', url.toString());
    } catch (_e) {}
  }

  async function claimPairCode(code) {
    code = String(code || '').toUpperCase().replace(/[^A-Z2-9]/g, '');
    if (!code) return false;
    try {
      var res = await fetch(API_BASE + '/api/pair/claim', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ code: code })
      });
      var data = await res.json().catch(function() { return {}; });
      if (!res.ok || !data || !data.token) { window.__minkaPairExpired = true; return false; }
      setToken(data.token, true);
      var pairGate = document.getElementById('minka-pair-required');
      if (pairGate) pairGate.remove();
      notifyIframeAuth();
      return true;
    } catch (_e) {
      window.__minkaPairExpired = true;
      return false;
    }
  }

  async function tryPairLoginFromQuery() {
    var code = '';
    try {
      var url = new URL(window.location.href);
      code = String(url.searchParams.get('pair') || '').trim();
      if (code) { url.searchParams.delete('pair'); history.replaceState({}, '', url.toString()); }
    } catch (_e) {}
    return claimPairCode(code);
  }

  async function tryAutoLoginFromQuery() {
    try {
      var url = new URL(window.location.href);
      var password = String(url.searchParams.get(AUTO_PW_KEY) || '').trim();
      if (!password) return false;
      var res = await fetch(API_BASE + '/api/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ password: password })
      });
      var data = await res.json().catch(function() { return {}; });
      if (!res.ok || !data || !data.token) return false;
      setToken(data.token, true);
      stripAutoLoginParam();
      notifyIframeAuth();
      return true;
    } catch (_e) {
      return false;
    }
  }

  function showPairRequired() {
    function mount() {
      if (document.getElementById('minka-pair-required')) return;
      document.documentElement.style.visibility = '';
      var overlay = document.createElement('div');
      overlay.id = 'minka-pair-required';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:1000000;display:flex;align-items:center;justify-content:center;padding:24px;background:#050910;font-family:Inter,system-ui,sans-serif;color:#f4f7ff;text-align:center;';
      overlay.innerHTML = '<div style="width:min(360px,100%);padding:30px 24px;border:1px solid rgba(255,255,255,.10);border-radius:22px;background:#0b1019;box-shadow:0 24px 70px rgba(0,0,0,.45)">'
        + '<div style="font-size:23px;font-weight:800;letter-spacing:-.03em">Piekļuve telefonā</div>'
        + '<div style="margin-top:10px;font-size:14px;line-height:1.55;color:rgba(220,228,244,.68)">Ievadi vienreizējo kodu no <b style="color:#f4f7ff">MOBILE</b> loga datorā.</div>'
        + '<input id="minka-pair-code" type="text" inputmode="text" autocomplete="one-time-code" autocapitalize="characters" maxlength="11" placeholder="XXXX · XXXX" style="width:100%;height:52px;margin-top:22px;box-sizing:border-box;border:1px solid rgba(255,255,255,.13);border-radius:14px;background:#111722;color:#fff;text-align:center;font:750 18px/1 ui-monospace,monospace;letter-spacing:.15em;outline:none;text-transform:uppercase">'
        + '<button id="minka-pair-submit" type="button" style="width:100%;height:48px;margin-top:12px;border:0;border-radius:14px;background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;font:750 14px/1 Inter,system-ui,sans-serif">Savienot</button>'
        + '<div id="minka-pair-error" style="min-height:18px;margin-top:11px;color:#fca5a5;font-size:12px"></div>'
        + '</div>';
      document.body.appendChild(overlay);
      var input = document.getElementById('minka-pair-code');
      var submit = document.getElementById('minka-pair-submit');
      var error = document.getElementById('minka-pair-error');
      async function connect() {
        var code = String(input.value || '').toUpperCase().replace(/[^A-Z2-9]/g, '');
        error.textContent = '';
        if (code.length !== 8) { error.textContent = 'Ievadi visus 8 koda simbolus.'; return; }
        submit.disabled = true;
        submit.textContent = 'Savieno…';
        var ok = await claimPairCode(code);
        if (!ok) {
          error.textContent = 'Kods nav derīgs. Datorā izveido jaunu kodu.';
          submit.disabled = false;
          submit.textContent = 'Savienot';
        }
      }
      input.addEventListener('input', function() {
        var clean = input.value.toUpperCase().replace(/[^A-Z2-9]/g, '').slice(0, 8);
        input.value = clean.length > 4 ? clean.slice(0, 4) + ' · ' + clean.slice(4) : clean;
      });
      input.addEventListener('keydown', function(e) { if (e.key === 'Enter') connect(); });
      submit.addEventListener('click', connect);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount, { once: true });
    else mount();
  }

  var hasPairCode = false;
  try { hasPairCode = !!new URL(window.location.href).searchParams.get('pair'); } catch (_e) {}

  if (hasPairCode) {
    document.addEventListener('DOMContentLoaded', function() {
      tryPairLoginFromQuery().then(function(paired) {
        if (paired) return;
        setToken('', false);
        showPairRequired();
      });
    }, { once: true });
  } else if (!getToken()) {
    document.addEventListener('DOMContentLoaded', function() {
      tryAutoLoginFromQuery().then(function(ok) {
        if (ok) return;
        showPairRequired();
      });
    }, { once: true });
  } else {
    stripAutoLoginParam();
    document.addEventListener('DOMContentLoaded', notifyIframeAuth, { once: true });
  }

  window.addEventListener('message', function(event) {
    if (event.origin !== window.location.origin || !event.data || event.data.type !== 'minka_auth_required') return;
    var frame = document.getElementById('calIframe');
    if (!frame || event.source !== frame.contentWindow) return;
    setToken('', false);
    showPairRequired();
  });
})();
</script>
<script>
(function() {
  try {
    var nav = window.navigator || {};
    var mem = Number(nav.deviceMemory || 0);
    var cores = Number(nav.hardwareConcurrency || 0);
    var reduceMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    var lowSpec = reduceMotion || (mem > 0 && mem <= 8) || (cores > 0 && cores <= 4);
    window.__mkPerfProfile = {
      lowSpec: lowSpec,
      reducedMotion: reduceMotion,
      deviceMemory: mem,
      hardwareConcurrency: cores
    };
    if (lowSpec) document.documentElement.classList.add('mk-low-spec');
  } catch (_e) {
    window.__mkPerfProfile = { lowSpec: false, reducedMotion: false, deviceMemory: 0, hardwareConcurrency: 0 };
  }
})();
</script>

<style>
:root {
  --font: 'Space Grotesk', system-ui, sans-serif;
  --dock-h: 60px;
  --dock-btn-h: clamp(36px, 6.8svh, 42px);
  --dock-icon-size: clamp(16px, 3.2svh, 20px);
  --dock-seg-h: clamp(17px, 3.2svh, 21px);
  --calendar-bottom: calc(var(--dock-h) + env(safe-area-inset-bottom, 0px) + 4px);
  --page-pad: 0px;
  --accent: #00c8ff;
  --accent-2: #38bdf8;
  --ink: #e8f4ff;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  overflow: hidden;
  font-family: var(--font);
  color: var(--ink);
  background: #000;
}

body * { font-family: var(--font), inherit; }

#calendarEmbed {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: var(--calendar-bottom);
  z-index: 1;
  overflow: hidden;
  border-radius: 0;
  border: 0;
  background: transparent;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  box-shadow: none;
  opacity: 1;
  transition: bottom .32s cubic-bezier(.22,1,.36,1);
}

#calendarEmbed.is-ready {
  opacity: 1;
}

html.mk-low-spec #calendarEmbed {
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

#calendarEmbed iframe {
  display: block;
  width: 100%;
  height: 100%;
  border: 0;
  background: transparent;
}

#mobileDataLoader {
  position: absolute;
  inset: 0;
  z-index: 4;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: #000;
  transition: opacity .24s ease, visibility .24s ease;
}
#mobileDataLoader.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.mdl-wrap { width: min(430px, 100%); }
.mdl-label { margin-bottom: 16px; text-align: center; color: rgba(218,226,242,.58); font: 650 12px/1.3 var(--font); letter-spacing: .04em; }
.mdl-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 8px; }
.mdl-card { aspect-ratio: 1/.92; border-radius: 16px; border: 1px solid rgba(150,168,194,.12); background: linear-gradient(105deg,#0d1420 28%,#172235 42%,#0d1420 58%); background-size: 220% 100%; animation: mdlShimmer 1.25s ease-in-out infinite; }
.mdl-card:nth-child(2),.mdl-card:nth-child(5){animation-delay:.12s}.mdl-card:nth-child(3),.mdl-card:nth-child(6){animation-delay:.24s}
@keyframes mdlShimmer { 0%{background-position:110% 0} 100%{background-position:-110% 0} }
@media (prefers-reduced-motion:reduce){.mdl-card{animation:none}}

.mobile-dock {
  position: fixed;
  left: 6px;
  right: 6px;
  bottom: 6px;
  z-index: 30;
  padding: 6px 6px calc(6px + env(safe-area-inset-bottom, 0px));
  border-radius: 24px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03) 30%, rgba(255,255,255,.02) 100%),
    rgba(8,16,28,.58);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border: 1px solid rgba(255,255,255,.16);
  box-shadow: 0 16px 40px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.10), inset 0 -1px 0 rgba(255,255,255,.03);
}

.mobile-dock-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
}

.dock-btn {
  appearance: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  border: 1px solid rgba(255,255,255,.14);
  background:
    linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.05) 28%, rgba(255,255,255,.02)),
    rgba(10,20,34,.52);
  color: #eef7ff;
  border-radius: 16px;
  min-height: 50px;
  padding: 6px 4px 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 6px 16px rgba(0,0,0,.10);
}

.dock-btn:active {
  transform: translateY(1px) scale(.99);
}

.dock-icon {
  width: 24px;
  height: 24px;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,.09);
  font-size: 12px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
}
/* Pikseļu ikonas (SVG) — bez fona kastes, dabīgas proporcijas, asas */
.dock-icon.dock-px {
  width: 22px !important;
  height: auto !important;
  background: transparent !important;
  box-shadow: none !important;
  border-radius: 0 !important;
  image-rendering: pixelated;
}

.dock-btn.is-active {
  border-color: rgba(0,200,255,.40);
  box-shadow: 0 10px 24px rgba(0,200,255,.12), inset 0 1px 0 rgba(255,255,255,.12);
}

.dock-btn.primary {
  background:
    linear-gradient(180deg, rgba(0,200,255,.18), rgba(79,70,229,.14)),
    rgba(8,18,30,.90);
}

.dock-btn.hidden-install {
  display: none;
}

#bolusDocBtn {
  position: relative;
  overflow: visible;
  gap: 5px;
  padding: 5px 4px 5px 7px;
  flex-direction: row;
  align-items: center;
  justify-content: stretch;
  background:

}

#bolusDocBtn::after {
  content: "";
  position: absolute;
  left: 0;

  border-radius: 0 99px 99px 0;
  display: none;
}

#bolusDocBtn .bolus-dock-title {

  align-items: center;
  flex: 1 1 auto;
  min-width: 0;
  font-size: 9px;
  line-height: 1;
  font-weight: 900;
  letter-spacing: .10em;
  text-transform: uppercase;

  text-shadow: 0 1px 0 rgba(0,0,0,.55), 0 0 10px rgba(255,255,255,.14);
}

#bolusDocBtn .bolus-dock-mark {
  width: 15px;
  height: 15px;
  flex: 0 0 auto;
  position: relative;
}

#bolusDocBtn .bolus-dock-mark::before {
  content: "";
  position: absolute;
  left: 3px;
  top: 2px;
  width: 8px;
  height: 10px;
  border: 2px solid #34d7bf;
  border-radius: 10px 10px 10px 2px;
  transform: rotate(45deg);
  box-shadow: 0 0 10px rgba(52,215,191,.55);
}

#bolusDocBtn .bolus-room-row {
  display: grid;
  grid-template-columns: repeat(2,minmax(0,1fr));
  gap: 4px;
  width: 56px;
  flex: 0 0 56px;
}

#bolusDocBtn .bolus-room-seg {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 0;
  height: 30px;
  border-radius: 9px;
  border: 1px solid rgba(74,95,122,.32);
  background: rgba(6,10,17,.72);
  color: rgba(197,207,220,.72);
  font-size: 8px;
  font-weight: 900;
  letter-spacing: .10em;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 -1px 0 rgba(0,0,0,.38), 0 2px 7px rgba(0,0,0,.26);
}

#bolusDocBtn .bolus-room-seg.is-fresh {
  border-color: rgba(52,215,191,.78);
  background: linear-gradient(180deg,rgba(56,214,187,.94),rgba(37,194,169,.90));
  color: #031b1a;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.24), 0 0 0 1px rgba(52,215,191,.14), 0 0 13px rgba(52,215,191,.36);

#bolusDocBtn .bolus-room-seg.is-stale {

  color: #ffe8eb;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 0 0 1px rgba(255,76,96,.16), 0 0 13px rgba(255,76,96,.42);
  animation: bolusRoomBlink 1.15s ease-in-out infinite;

@keyframes bolusRoomBlink {
  0%,100% { filter: brightness(1); box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 0 0 1px rgba(255,76,96,.16), 0 0 12px rgba(255,76,96,.34); }
  50% { filter: brightness(1.28); box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 0 0 1px rgba(255,76,96,.28), 0 0 22px rgba(255,76,96,.70); }

    function _bcSync() {

    var _history = { ge: [], philips: [] };

    var _workersCache = {};

    }
    function _collectWorkersFromStore(storeObj, dateStr, seen, out) {
      if (!storeObj || typeof storeObj !== 'object' || !dateStr) return;
      for (var month in storeObj) {
        var days = storeObj[month];
        if (!Array.isArray(days)) continue;
        for (var i = 0; i < days.length; i++) {

    });
    function _shiftStart() {
      var now = new Date();

    function _pickTs(room) {
      if (_pick[room] !== null) return _pick[room];

        var d = new Date(saved), t = new Date();

      return saved;
    }
    function _save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(_state)); } catch(e) {} }
    function _saveHistory() { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(_history)); } catch(e) {} }
    function _load() {
      try {
        var p = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');

    function _kvPull(cb) {
      fetch(GS_URL + '?_=' + Date.now(), { cache: 'no-store' }).then(function(r){ return r.json(); }).then(function(remote) {
        if (!remote || typeof remote !== 'object') return;

            // History is the source of truth: after a delete on another device
            // the correct changedAt moves BACKWARD, so recompute from the top

    window.toggleBolus = function(forceState) {
      var ov = document.getElementById('bolus-overlay');
      if (!ov) return;
      var nextState = (typeof forceState === 'boolean') ? forceState : !_open;
      if (nextState === _open) return;
      _open = nextState;
      ov.style.display = _open ? 'flex' : 'none';
      var btn = document.getElementById('bolusDocBtn');
      if (btn) btn.classList.toggle('is-active', _open);
      if (_open) {
        try {
          var calendarFrame = document.getElementById('calIframe');
          if (calendarFrame && calendarFrame.contentWindow) {
            calendarFrame.contentWindow.postMessage({ type: 'mk_request_workers_index' }, window.location.origin);
          }
        } catch(_e) {}
        _render();
        setTimeout(function(){ if (_open) _render(); }, 250);
        _startTick();
        _refreshSync(true);
      }
      else { _stopTick(); _scheduleSync(); }
    };
    function init() {
      _load();
      _injectCss();
      var ov = document.createElement('div');
      ov.id = 'bolus-overlay';
      ov.innerHTML = '<div id="bolus-sheet"><div id="bolus-handle"></div><div id="bolus-title-bar"><span id="bolus-title"><svg width="11" height="11" viewBox="0 0 24 24" style="opacity:.7;vertical-align:-1px" aria-hidden="true"><path d="M18 2l4 4M19 5l-2 2M6 18l-4 4M3 21l2-2M17 7l-10 10 3 3L20 10zM10 14l2 2M13 11l2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> BOLUSA MAINA</span><span style="display:flex;gap:8px;align-items:center;"><button id="bolus-tops-btn" type="button" title="Menesa caklakie">🏆 TOPS</button><button id="bolus-close-btn" type="button" aria-label="Aizvert bolus paneli">✕</button></span></div><div id="bolus-tops" style="display:none"></div><div id="bolus-rooms"></div></div>';
      ov.addEventListener('click', function(e){
        var sheet = document.getElementById('bolus-sheet');
        if (!sheet) return;
        if (!sheet.contains(e.target)) toggleBolus(false);
      });
      ov.addEventListener('pointerdown', function(e){
        var sheet = document.getElementById('bolus-sheet');
        if (!sheet) return;
        if (!sheet.contains(e.target)) toggleBolus(false);
      });
      document.body.appendChild(ov);
      var topsBtn = document.getElementById('bolus-tops-btn');
      if (topsBtn) topsBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var p = document.getElementById('bolus-tops');
        if (!p) return;
        var opening = p.style.display === 'none';
        if (opening) _renderTops();
        p.style.display = opening ? 'block' : 'none';
        topsBtn.classList.toggle('on', opening);
      });
      var closeBtn = document.getElementById('bolus-close-btn');
      if (closeBtn) {
        closeBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); toggleBolus(false); });
        closeBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); });
      }
      _initBc();
      _updateLed();
      function _requestWorkers() {
        var calendarFrame = document.getElementById('calIframe');
        if (calendarFrame && calendarFrame.contentWindow) {
          try { calendarFrame.contentWindow.postMessage({ type: 'mk_request_workers_index' }, window.location.origin); } catch(e) {}
        }
      }
      setTimeout(_requestWorkers, 800);
      setTimeout(_requestWorkers, 3000);
      setTimeout(function(){ _refreshSync(true); }, 2000);
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          if (_syncTimer) { clearTimeout(_syncTimer); _syncTimer = null; }
        } else {
          _refreshSync(Date.now() - _lastSyncAt >= 30000);
        }
      }, { passive: true });
    }
    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', function(){ setTimeout(init,500); });
    else setTimeout(init, 500);
  })();
  </script>

  <script>
  let _syncRaf = 0;
  let _nsOpen = false;

  function hideMobileDataLoader() {
    var loader = document.getElementById('mobileDataLoader');
    if (loader) loader.classList.add('is-hidden');
  }

  function watchMobileCards(attempt) {
    var frame = document.getElementById('calIframe');
    try {
      if (frame && frame.contentDocument && frame.contentDocument.querySelector('#grafiks-list .card')) {
        hideMobileDataLoader();
        return;
      }
    } catch (_e) {}
    if ((attempt || 0) < 100) setTimeout(function(){ watchMobileCards((attempt || 0) + 1); }, 100);
  }
  function syncShellLayout() {
    cancelAnimationFrame(_syncRaf);
    _syncRaf = requestAnimationFrame(function() {
      document.documentElement.style.setProperty('--dock-h', Math.max(50, Math.round(document.getElementById('dockShelf').getBoundingClientRect().height || 54)) + 'px');
      const iframe = document.getElementById('calIframe');
      if (iframe && iframe.contentWindow) {
        try {
          iframe.contentWindow.postMessage({
            type: 'hostLayoutChanged',
            radioVisible: false,
            radioHeight: 0,
            buttonBarHeight: Math.round(document.getElementById('dockShelf').getBoundingClientRect().height || 76)
          }, '*');
        } catch (_e) {}
      }
    });
  }

  function openStatsFromDock() {
    // Tiešs toggle (kā desktop) — NEVIS postMessage. Iframe klausās mk_open_stats
    // ar DIVIEM handleriem (viens atver, otrs pārslēdz), kas viens otru atceļ →
    // modālis uzreiz aizveras. Tieša izsaukšana to apiet.
    const iframe = document.getElementById('calIframe');
    const iwin = iframe && iframe.contentWindow;
    const idoc = iframe && (iframe.contentDocument || (iwin && iwin.document));
    if (!iwin || !idoc) return;
    const modal = idoc.getElementById('stats-modal');
    const isOpen = modal && modal.style.display && modal.style.display !== 'none';
    try {
      if (isOpen) {
        if (typeof iwin.closeStatsModal === 'function') iwin.closeStatsModal();
        else modal.style.display = 'none';
      } else if (typeof iwin.openStatsModal === 'function') {
        iwin.openStatsModal();
      }
    } catch (_e) {}
  }

  function openSettingsFromDock() {
    const iframe = document.getElementById('calIframe');
    if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage({ type: 'mk_open_settings' }, '*');
  }

  var _nsToggleAt = 0;
  function toggleNsFromParent() {
    // iOS var izšaut touchend + ghost click pēc ~300ms — bez šī sarga poga
    // atver un tūlīt aizver pārklājumu, izskatās, ka "nekas nenotika".
    var nowT = Date.now();
    if (nowT - _nsToggleAt < 400) return;
    _nsToggleAt = nowT;
    _nsOpen = !_nsOpen;
    const iframe = document.getElementById('calIframe');
    if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage({ type: 'toggleNs', open: _nsOpen }, '*');
    document.getElementById('nsToggleBtnParent').classList.toggle('is-active', _nsOpen);
  }

  function showInstallDialog() {
    const el = document.getElementById('pwaInstall');
    if (!el || typeof el.showDialog !== 'function') return;
    el.showDialog();
  }

  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'mk_stats_closed') document.getElementById('statsDocBtn').classList.remove('is-active');
    if (e.data.type === 'mk_stats_opened') document.getElementById('statsDocBtn').classList.add('is-active');
    if (e.data.type === 'mk_settings_closed') document.getElementById('settingsDockBtn').classList.remove('is-active');
    if (e.data.type === 'mk_settings_opened') document.getElementById('settingsDockBtn').classList.add('is-active');
    if (e.data.type === 'nsClosed') {
      _nsOpen = false;
      document.getElementById('nsToggleBtnParent').classList.remove('is-active');
    }
    if (e.data.type === 'minka:appReady') hideMobileDataLoader();
  });

  document.addEventListener('click', function(e) {
    const b = e.target.closest('button');
    if (!b) return;
    if (!window.AudioContext && !window.webkitAudioContext) return;
    try {
      if (!window.__dockAudioCtx) window.__dockAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const c = window.__dockAudioCtx;
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g);
      g.connect(c.destination);
      o.type = 'sine';
      o.frequency.value = b.id === 'nsToggleBtnParent' ? 420 : 460;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(0.035, c.currentTime + 0.008);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.12);
      o.start(c.currentTime);
      o.stop(c.currentTime + 0.13);
    } catch (_e) {}
  }, true);

  document.addEventListener('DOMContentLoaded', function() {
    const iframe = document.getElementById('calIframe');
    if (iframe) iframe.addEventListener('load', function() {
      setTimeout(syncShellLayout, 90);
      watchMobileCards(0);
    });
    syncShellLayout();
    setTimeout(hideMobileDataLoader, 10000);
  });

  window.addEventListener('resize', syncShellLayout, { passive: true });
  window.addEventListener('orientationchange', function() { setTimeout(syncShellLayout, 220); }, { passive: true });

  if ('ResizeObserver' in window) {
    const ro = new ResizeObserver(syncShellLayout);
    ro.observe(document.documentElement);
    ro.observe(document.getElementById('dockShelf'));
  }
  </script>

  <script>
  if ('serviceWorker' in navigator && /^https?:$/i.test(location.protocol)) {
    const MINKA_APP_VERSION = '2026.07.13b.mobile';
    const MINKA_VERSION_KEY = 'minka_mobile_app_version';
    const MINKA_RELOAD_KEY = 'minka_mobile_sw_reloading';
    function clearMinkaRuntimeCaches() {
      try {
        localStorage.removeItem('minka_schedule_cache_v2');
        localStorage.removeItem('minka_schedule_cache_ts_v2');
        localStorage.removeItem('minka_emoji_v1');
      } catch (_e) {}
      return Promise.resolve();
    }
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(async (r) => {
          try {
            const prev = localStorage.getItem(MINKA_VERSION_KEY);
            if (prev !== MINKA_APP_VERSION) {
              await clearMinkaRuntimeCaches();
              localStorage.setItem(MINKA_VERSION_KEY, MINKA_APP_VERSION);
              await r.update();
            }
          } catch (_e) {}

          if (r.waiting) r.waiting.postMessage({ type: 'SKIP_WAITING' });
          r.addEventListener('updatefound', () => {
            const next = r.installing;
            if (!next) return;
            next.addEventListener('statechange', () => {
              if (next.state === 'installed' && navigator.serviceWorker.controller) next.postMessage({ type: 'SKIP_WAITING' });
            });
          });

          navigator.serviceWorker.addEventListener('controllerchange', () => {
            try {
              if (sessionStorage.getItem(MINKA_RELOAD_KEY) === MINKA_APP_VERSION) return;
              sessionStorage.setItem(MINKA_RELOAD_KEY, MINKA_APP_VERSION);
            } catch (_e) {}
            location.reload();
          });
        })
        .catch(function(e) { console.log('SW error:', e); });
    });
  }
  </script>
