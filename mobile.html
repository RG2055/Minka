<!DOCTYPE html>
<html lang="lv">
<head>
<script>
(function() {
  var API_BASE = 'https://minka-api.gamernr1elite.workers.dev';
  var TOKEN_KEY = 'minka_api_token_v1';

  function getToken() {
    try { return sessionStorage.getItem(TOKEN_KEY) || localStorage.getItem(TOKEN_KEY) || ''; }
    catch (_e) { return ''; }
  }

  function setToken(token, persist) {
    try {
      sessionStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(TOKEN_KEY);
      if (token) {
        if (persist) localStorage.setItem(TOKEN_KEY, token);
        else sessionStorage.setItem(TOKEN_KEY, token);
      }
    } catch (_e) {}
  }

  function notifyIframeAuth() {
    setTimeout(function() {
      var f = document.getElementById('calIframe');
      if (!f) return;
      var base = f.getAttribute('data-base-src') || 'kalendars/index.html';
      var token = getToken();
      var next = base;
      if (token) next += (next.indexOf('?') >= 0 ? '&' : '?') + 'token=' + encodeURIComponent(token);
      if (f.getAttribute('src') !== next) f.setAttribute('src', next);
      if (f.contentWindow) f.contentWindow.postMessage({ type: 'minka_auth_ok' }, '*');
    }, 180);
  }

  function showGate() {
    document.documentElement.style.visibility = 'hidden';
    document.addEventListener('DOMContentLoaded', function() {
      document.documentElement.style.visibility = '';
      var overlay = document.createElement('div');
      overlay.id = 'minka-gate';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(4,7,14,.86);display:flex;align-items:center;justify-content:center;z-index:999999;font-family:system-ui,sans-serif;backdrop-filter:blur(12px);padding:20px';
      overlay.innerHTML = ''
        + '<div style="background:#0d1118;border:1px solid rgba(255,255,255,0.10);border-radius:22px;padding:24px 22px 18px;text-align:left;width:min(420px,calc(100vw - 28px));box-shadow:0 28px 80px rgba(0,0,0,.55);color:#eef2ff;">'
        + '<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;">'
        + '<div style="width:50px;height:50px;border-radius:16px;border:1px solid rgba(0,200,255,0.22);background:radial-gradient(circle at 30% 30%, rgba(0,200,255,0.26), rgba(0,91,182,0.11) 60%, transparent 100%), #121722;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05),0 10px 24px rgba(0,0,0,0.22);font-size:24px;">&#128241;</div>'
        + '<div><div style="font-size:18px;font-weight:800;line-height:1.1;">Minka Mobile</div><div style="margin-top:4px;font-size:12px;color:rgba(203,213,225,0.72);">Dro&#353;a piek&#316;uve kalend&#257;ram no telefona.</div></div>'
        + '</div>'
        + '<div style="font-size:12px;line-height:1.55;color:rgba(226,232,240,0.76);margin-bottom:16px;">Sensit&#299;vie dati tiek iel&#257;d&#275;ti tikai p&#275;c autoriz&#257;cijas.</div>'
        + '<input id="minka-pw" type="password" placeholder="Parole" autocomplete="current-password" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:12px 14px;color:#fff;font-size:14px;outline:none;margin-bottom:12px">'
        + '<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(203,213,225,0.72);margin-bottom:14px;"><input id="minka-remember" type="checkbox" style="accent-color:#00c8ff"> Atcer&#275;ties &#353;o ier&#299;ci</label>'
        + '<button id="minka-btn" style="width:100%;background:linear-gradient(135deg,#00b7ff,#4f46e5);border:none;border-radius:14px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">Ieiet</button>'
        + '<div id="minka-err" style="color:#f87171;font-size:12px;margin-top:10px;min-height:16px"></div>'
        + '</div>';
      document.body.prepend(overlay);
      var input = document.getElementById('minka-pw');
      var btn = document.getElementById('minka-btn');
      var err = document.getElementById('minka-err');
      var remember = document.getElementById('minka-remember');

      async function attempt() {
        var password = String(input.value || '').trim();
        err.textContent = '';
        if (!password) {
          err.textContent = 'Ievadi paroli';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Pārbauda...';
        try {
          var res = await fetch(API_BASE + '/api/login', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ password: password })
          });
          var data = await res.json().catch(function() { return {}; });
          if (!res.ok || !data || !data.token) throw new Error((data && data.error) || 'Login failed');
          setToken(data.token, !!(remember && remember.checked));
          notifyIframeAuth();
          overlay.style.transition = 'opacity 0.3s';
          overlay.style.opacity = '0';
          setTimeout(function() { overlay.remove(); }, 300);
        } catch (_e) {
          err.textContent = 'Nepareiza parole vai API nav sasniedzams';
          input.value = '';
          input.focus();
        } finally {
          btn.disabled = false;
          btn.textContent = 'Ieiet';
        }
      }

      btn.addEventListener('click', attempt);
      input.addEventListener('keydown', function(e) { if (e.key === 'Enter') attempt(); });
      input.focus();
    }, { once: true });
  }

  if (!getToken()) showGate();
  else document.addEventListener('DOMContentLoaded', notifyIframeAuth, { once: true });
})();
</script>
<script>
(function() {
  try {
    var nav = window.navigator || {};
    var mem = Number(nav.deviceMemory || 0);
    var cores = Number(nav.hardwareConcurrency || 0);
    var reduceMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    var lowSpec = reduceMotion || (mem > 0 && mem <= 8) || (cores > 0 && cores <= 4);
    window.__mkPerfProfile = {
      lowSpec: lowSpec,
      reducedMotion: reduceMotion,
      deviceMemory: mem,
      hardwareConcurrency: cores
    };
    if (lowSpec) document.documentElement.classList.add('mk-low-spec');
  } catch (_e) {
    window.__mkPerfProfile = { lowSpec: false, reducedMotion: false, deviceMemory: 0, hardwareConcurrency: 0 };
  }
})();
</script>

<style>
:root {
  --font: 'Space Grotesk', system-ui, sans-serif;
  --dock-h: 76px;
  --calendar-bottom: calc(var(--dock-h) + env(safe-area-inset-bottom, 0px) + 4px);
  --page-pad: 0px;
  --accent: #00c8ff;
  --accent-2: #38bdf8;
  --ink: #e8f4ff;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  overflow: hidden;
  font-family: var(--font);
  color: var(--ink);
  background: #040915;
}

body * { font-family: var(--font), inherit; }

#mobileLoader {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 16px;
  padding: 28px;
  background:
    radial-gradient(900px 640px at 50% 0%, rgba(0,200,255,.18), transparent 54%),
    radial-gradient(500px 320px at 20% 18%, rgba(92,103,255,.18), transparent 60%),
    linear-gradient(180deg, #040b16, #07101f 48%, #050c18);
  transition: opacity .55s ease, visibility .55s ease, transform .55s ease;
  overflow: hidden;
}

#mobileLoader.is-hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transform: scale(1.015);
}

#mobileLoader::before,
#mobileLoader::after {
  content: "";
  position: absolute;
  inset: auto;
  border-radius: 999px;
  filter: blur(22px);
  opacity: .48;
  pointer-events: none;
}

#mobileLoader::before {
  width: 220px;
  height: 220px;
  top: 12%;
  left: -40px;
  background: radial-gradient(circle, rgba(0,200,255,.22), transparent 70%);
}

#mobileLoader::after {
  width: 260px;
  height: 260px;
  right: -60px;
  bottom: 12%;
  background: radial-gradient(circle, rgba(106,92,255,.18), transparent 72%);
}

.loader-shell {
  position: relative;
  width: min(320px, calc(100vw - 40px));
  padding: 22px 20px 18px;
  border-radius: 28px;
  border: 1px solid rgba(255,255,255,.10);
  background:
    linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03) 28%, rgba(255,255,255,.02)),
    rgba(7,14,26,.58);
  box-shadow:
    0 24px 80px rgba(0,0,0,.34),
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -1px 0 rgba(255,255,255,.03);
  backdrop-filter: blur(24px) saturate(1.14);
  -webkit-backdrop-filter: blur(24px) saturate(1.14);
}

.loader-shell::after {
  content: "";
  position: absolute;
  left: 16px;
  right: 16px;
  top: 12px;
  height: 5px;
  border-radius: 999px;
  background: rgba(255,255,255,.10);
}

.loader-mark {
  width: 88px;
  height: 88px;
  margin: 8px auto 4px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 30% 30%, rgba(0,200,255,.32), rgba(0,200,255,0) 62%),
    linear-gradient(160deg, rgba(255,255,255,.12), rgba(255,255,255,.03));
  box-shadow: 0 20px 60px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08);
  animation: loaderPulse 2.1s ease-in-out infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.loader-mark img {
  width: 64px;
  height: 64px;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 8px 18px rgba(0,0,0,.22));
}

.loader-title {
  text-align: center;
  font-size: .82rem;
  letter-spacing: .24em;
  text-transform: uppercase;
  font-weight: 700;
  color: rgba(232,244,255,.78);
}

.loader-sub {
  text-align: center;
  font-size: .9rem;
  color: rgba(232,244,255,.56);
}

.loader-progress {
  width: min(250px, 72vw);
  height: 6px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,.08);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
}

.loader-progress-bar {
  width: 42%;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, rgba(0,200,255,.92), rgba(123,97,255,.88));
  box-shadow: 0 0 22px rgba(0,200,255,.28);
  animation: loaderBar 1.45s cubic-bezier(.37,.01,.63,1) infinite;
}

.loader-caption {
  font-size: .74rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(232,244,255,.42);
}

@keyframes loaderPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 20px 60px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08); }
  50% { transform: scale(1.025); box-shadow: 0 24px 72px rgba(0,0,0,.34), 0 0 40px rgba(0,200,255,.12), inset 0 1px 0 rgba(255,255,255,.10); }
}

@keyframes loaderBar {
  0% { transform: translateX(-92%); }
  100% { transform: translateX(230%); }
}

#calendarEmbed {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: var(--calendar-bottom);
  z-index: 1;
  overflow: hidden;
  border-radius: 0;
  border: 0;
  background: transparent;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  box-shadow: none;
  opacity: 0;
  transition: bottom .32s cubic-bezier(.22,1,.36,1), opacity .38s ease;
}

#calendarEmbed.is-ready {
  opacity: 1;
}

html.mk-low-spec #calendarEmbed {
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

#calendarEmbed iframe {
  display: block;
  width: 100%;
  height: 100%;
  border: 0;
  background: transparent;
}

.mobile-dock {
  position: fixed;
  left: 6px;
  right: 6px;
  bottom: 6px;
  z-index: 30;
  padding: 6px 6px calc(6px + env(safe-area-inset-bottom, 0px));
  border-radius: 24px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03) 30%, rgba(255,255,255,.02) 100%),
    rgba(8,16,28,.58);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border: 1px solid rgba(255,255,255,.16);
  box-shadow: 0 16px 40px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.10), inset 0 -1px 0 rgba(255,255,255,.03);
}

.mobile-dock-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
}

.dock-btn {
  appearance: none;
  border: 1px solid rgba(255,255,255,.14);
  background:
    linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.05) 28%, rgba(255,255,255,.02)),
    rgba(10,20,34,.52);
  color: #eef7ff;
  border-radius: 16px;
  min-height: 50px;
  padding: 6px 4px 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 6px 16px rgba(0,0,0,.10);
}

.dock-btn:active {
  transform: translateY(1px) scale(.99);
}

.dock-icon {
  width: 24px;
  height: 24px;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,.09);
  font-size: 12px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
}

.dock-btn.is-active {
  border-color: rgba(0,200,255,.40);
  box-shadow: 0 10px 24px rgba(0,200,255,.12), inset 0 1px 0 rgba(255,255,255,.12);
}

.dock-btn.primary {
  background:
    linear-gradient(180deg, rgba(0,200,255,.18), rgba(79,70,229,.14)),
    rgba(8,18,30,.90);
}

.dock-btn.hidden-install {
  display: none;
}

@media (max-width: 390px) {
  :root {
    --dock-h: 72px;
  }

  #calendarEmbed {
    left: 0;
    right: 0;
    border-radius: 0;
  }

  .dock-btn {
    min-height: 46px;
    font-size: 8px;
  }

  .dock-icon {
    width: 22px;
    height: 22px;
  }

}

@media (orientation: landscape) and (max-height: 560px) {
  .mobile-dock-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .dock-btn {
    min-height: 50px;
  }
}
</style>
</head>

  (function(){

    ];

    var _history = { ge: [], philips: [] };
    var _names = { ge: '', philips: '' };
    try { _names.ge = localStorage.getItem('minkaBolusName_ge') || ''; } catch(e) {}
    try { _names.philips = localStorage.getItem('minkaBolusName_philips') || ''; } catch(e) {}
    var _workersCache = {};

    var _calOpen = { ge: false, philips: false };
    var _calView = { ge: null, philips: null };
    var _tpOpen = { ge: false, philips: false };
    var _chipDay = { ge: 0, philips: 0 };
    var LAT_MONTHS = ['Janvaris','Februaris','Marts','Aprilis','Maijs','Junijs','Julijs','Augusts','Septembris','Oktobris','Novembris','Decembris'];
    var LAT_DAYS   = ['P','O','T','C','Pk','S','Sv'];
    var _open = false, _tick = null, _bc = null;
    try { _bc = new BroadcastChannel('minka-bolus-sync'); } catch(e) {}

    function _tsToDateStr(ts) {
      var d = ts ? new Date(ts) : new Date();
      return ('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'+d.getFullYear();
    }
    function _collectWorkersFromStore(storeObj, dateStr, seen, out) {
      if (!storeObj || typeof storeObj !== 'object' || !dateStr) return;
      for (var month in storeObj) {
        var days = storeObj[month];
        if (!Array.isArray(days)) continue;
        for (var i = 0; i < days.length; i++) {
          var day = days[i];

  <script>
  let _syncRaf = 0;
  let _nsOpen = false;
  let _mobileLoaderHidden = false;
  let _mobileLoaderCanHideAt = Date.now() + 1150;

  function setMobileLoaderCaption(text) {
    var el = document.getElementById('mobileLoaderCaption');
    if (el && text) el.textContent = text;
  }

  function hideMobileLoader(delay) {
    if (_mobileLoaderHidden) return;
    const wait = Math.max(0, _mobileLoaderCanHideAt - Date.now(), delay || 0);
    setTimeout(function() {
      if (_mobileLoaderHidden) return;
      _mobileLoaderHidden = true;
      var el = document.getElementById('mobileLoader');
      if (el) el.classList.add('is-hidden');
      var embed = document.getElementById('calendarEmbed');
      if (embed) embed.classList.add('is-ready');
    }, wait);
  }

  function syncShellLayout() {
    cancelAnimationFrame(_syncRaf);
    _syncRaf = requestAnimationFrame(function() {
      document.documentElement.style.setProperty('--dock-h', Math.max(72, Math.round(document.getElementById('dockShelf').getBoundingClientRect().height || 76)) + 'px');
      const iframe = document.getElementById('calIframe');
      if (iframe && iframe.contentWindow) {
        try {
          iframe.contentWindow.postMessage({
            type: 'hostLayoutChanged',
            radioVisible: false,
            radioHeight: 0,
            buttonBarHeight: Math.round(document.getElementById('dockShelf').getBoundingClientRect().height || 76)
          }, '*');
        } catch (_e) {}
      }
    });
  }

  function openStatsFromDock() {
    const iframe = document.getElementById('calIframe');
    if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage({ type: 'mk_open_stats' }, '*');
  }

  function openSettingsFromDock() {
    const iframe = document.getElementById('calIframe');
    if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage({ type: 'mk_open_settings' }, '*');
  }

  function toggleNsFromParent() {
    _nsOpen = !_nsOpen;
    const iframe = document.getElementById('calIframe');
    if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage({ type: 'toggleNs', open: _nsOpen }, '*');
    document.getElementById('nsToggleBtnParent').classList.toggle('is-active', _nsOpen);
  }

  function showInstallDialog() {
    const el = document.getElementById('pwaInstall');
    if (!el || typeof el.showDialog !== 'function') return;
    el.showDialog();
  }

  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'mk_stats_closed') document.getElementById('statsDocBtn').classList.remove('is-active');
    if (e.data.type === 'mk_stats_opened') document.getElementById('statsDocBtn').classList.add('is-active');
    if (e.data.type === 'mk_settings_closed') document.getElementById('settingsDockBtn').classList.remove('is-active');
    if (e.data.type === 'mk_settings_opened') document.getElementById('settingsDockBtn').classList.add('is-active');
    if (e.data.type === 'nsClosed') {
      _nsOpen = false;
      document.getElementById('nsToggleBtnParent').classList.remove('is-active');
    }
    if (e.data.type === 'minka:appReady') {
      setMobileLoaderCaption('Kalendārs gatavs');
      hideMobileLoader(0);
    }
  });

  document.addEventListener('click', function(e) {
    const b = e.target.closest('button');
    if (!b) return;
    if (!window.AudioContext && !window.webkitAudioContext) return;
    try {
      if (!window.__dockAudioCtx) window.__dockAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const c = window.__dockAudioCtx;
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g);
      g.connect(c.destination);
      o.type = 'sine';
      o.frequency.value = b.id === 'nsToggleBtnParent' ? 420 : 460;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(0.035, c.currentTime + 0.008);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.12);
      o.start(c.currentTime);
      o.stop(c.currentTime + 0.13);
    } catch (_e) {}
  }, true);

  document.addEventListener('DOMContentLoaded', function() {
    const iframe = document.getElementById('calIframe');
    if (iframe) iframe.addEventListener('load', function() {
      setTimeout(syncShellLayout, 90);
      setMobileLoaderCaption('Ielādē maiņu datus…');
    });
    setTimeout(function() {
      setMobileLoaderCaption('Gandrīz gatavs…');
    }, 900);
    setTimeout(function() { hideMobileLoader(0); }, 7000);
    syncShellLayout();
  });

  window.addEventListener('resize', syncShellLayout, { passive: true });
  window.addEventListener('orientationchange', function() { setTimeout(syncShellLayout, 220); }, { passive: true });

  if ('ResizeObserver' in window) {
    const ro = new ResizeObserver(syncShellLayout);
    ro.observe(document.documentElement);
    ro.observe(document.getElementById('dockShelf'));
  }
  </script>

  <script type="module">
  import 'https://esm.sh/@khmyznikov/pwa-install';

  const pwaInstall = document.getElementById('pwaInstall');
  if (pwaInstall) {
    let installDialogShown = false;
    function tryShowInstallDialog(force) {
      if (!pwaInstall || typeof pwaInstall.showDialog !== 'function') return;
      const isStandalone = !!pwaInstall.isUnderStandaloneMode || !!window.matchMedia('(display-mode: standalone)').matches;
      if (isStandalone) return;
      if (installDialogShown && !force) return;
      installDialogShown = true;
      pwaInstall.showDialog(!!force);
    }
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        tryShowInstallDialog(false);
      }, 900);
    });
    pwaInstall.addEventListener('pwa-install-available-event', () => {
      setTimeout(() => tryShowInstallDialog(false), 80);
    });
    window.addEventListener('focus', () => {
      setTimeout(() => tryShowInstallDialog(false), 180);
    });
  }
  </script>

  <script>
  if ('serviceWorker' in navigator && /^https?:$/i.test(location.protocol)) {
    const MINKA_APP_VERSION = '2026.03.31.mobile.42';
    const MINKA_VERSION_KEY = 'minka_mobile_app_version';
    const MINKA_RELOAD_KEY = 'minka_mobile_sw_reloading';
    function clearMinkaRuntimeCaches() {
      try {
        localStorage.removeItem('minka_schedule_cache_v2');
        localStorage.removeItem('minka_schedule_cache_ts_v2');
        localStorage.removeItem('minka_emoji_v1');
      } catch (_e) {}
      return caches.keys().then(keys => Promise.all(keys.map(key => caches.delete(key)))).catch(() => {});
    }
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(async (r) => {
          try {
            const prev = localStorage.getItem(MINKA_VERSION_KEY);
            if (prev !== MINKA_APP_VERSION) {
              await clearMinkaRuntimeCaches();
              localStorage.setItem(MINKA_VERSION_KEY, MINKA_APP_VERSION);
              await r.update();
            }
          } catch (_e) {}

          if (r.waiting) r.waiting.postMessage({ type: 'SKIP_WAITING' });
          r.addEventListener('updatefound', () => {
            const next = r.installing;
            if (!next) return;
            next.addEventListener('statechange', () => {
              if (next.state === 'installed' && navigator.serviceWorker.controller) next.postMessage({ type: 'SKIP_WAITING' });
            });
          });

          navigator.serviceWorker.addEventListener('controllerchange', () => {
            try {
              if (sessionStorage.getItem(MINKA_RELOAD_KEY) === MINKA_APP_VERSION) return;
              sessionStorage.setItem(MINKA_RELOAD_KEY, MINKA_APP_VERSION);
            } catch (_e) {}
            location.reload();
          });
        })
        .catch(function(e) { console.log('SW error:', e); });
    });
  }
  </script>
