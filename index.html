<!DOCTYPE html>
<html lang="lv">
<head>
<script>
(function() {
  var API_BASE = 'https://minka-api.gamernr1elite.workers.dev';
  var TOKEN_KEY = 'minka_api_token_v1';

  function getToken() {
    try { return sessionStorage.getItem(TOKEN_KEY) || localStorage.getItem(TOKEN_KEY) || ''; }
    catch(e) { return ''; }
  }

  function setToken(token, persist) {
    try {
      sessionStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(TOKEN_KEY);
      if (token) {
        if (persist) localStorage.setItem(TOKEN_KEY, token);
        else sessionStorage.setItem(TOKEN_KEY, token);
      }
    } catch(e) {}
  }

  function notifyIframeAuth() {
    setTimeout(function() {
      var f = document.getElementById('calIframe');
      if (!f) return;
      var base = f.getAttribute('data-base-src') || 'kalendars/index.html';
      var token = getToken();
      var next = base;
      if (token) next += (next.indexOf('?') >= 0 ? '&' : '?') + 'token=' + encodeURIComponent(token);
      if (f.getAttribute('src') !== next) f.setAttribute('src', next);
      if (f.contentWindow) f.contentWindow.postMessage({ type: 'minka_auth_ok' }, '*');
    }, 180);
  }

  function showGate() {
    document.documentElement.style.visibility = 'hidden';
    document.addEventListener('DOMContentLoaded', function() {
      document.documentElement.style.visibility = '';
      var overlay = document.createElement('div');
      overlay.id = 'minka-gate';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(6,10,18,.84);display:flex;align-items:center;justify-content:center;z-index:999999;font-family:system-ui,sans-serif;backdrop-filter:blur(12px);padding:20px';
      overlay.innerHTML = ''
        + '<div style="background:#0d1118;border:1px solid rgba(255,255,255,0.10);border-radius:22px;padding:28px 28px 22px;text-align:left;width:min(420px,calc(100vw - 32px));box-shadow:0 28px 80px rgba(0,0,0,.55);color:#eef2ff;">'
        + '<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;">'
        + '<div style="width:52px;height:52px;border-radius:16px;border:1px solid rgba(139,92,246,0.28);background:radial-gradient(circle at 30% 30%, rgba(139,92,246,0.30), rgba(91,33,182,0.12) 60%, transparent 100%), #121722;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05),0 10px 24px rgba(0,0,0,0.22);font-size:24px;">&#128737;&#65039;</div>'
        + '<div><div style="font-size:18px;font-weight:800;line-height:1.1;">Dro&#353;a piek&#316;uve Minka</div><div style="margin-top:4px;font-size:12px;color:rgba(203,213,225,0.72);">Cloudflare aizsarg&#257;ta piek&#316;uve darba datiem un priv&#257;tajam sist&#275;mas saturam.</div></div>'
        + '</div>'
        + '<div style="font-size:12px;line-height:1.55;color:rgba(226,232,240,0.76);margin-bottom:16px;">Publiskaj&#257; versij&#257; sensit&#299;v&#257; inform&#257;cija netiek glab&#257;ta. Dati tiek iel&#257;d&#275;ti tikai p&#275;c autoriz&#257;cijas.</div>'
        + '<input id="minka-pw" type="password" placeholder="Parole" autocomplete="current-password" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:12px 14px;color:#fff;font-size:14px;outline:none;margin-bottom:12px">'
        + '<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(203,213,225,0.72);margin-bottom:14px;"><input id="minka-remember" type="checkbox" style="accent-color:#8b5cf6"> Atcer&#275;ties &#353;o ier&#299;ci</label>'
        + '<button id="minka-btn" style="width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:14px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">Ieiet</button>'
        + '<div id="minka-err" style="color:#f87171;font-size:12px;margin-top:10px;min-height:16px"></div>'
        + '</div>';
      document.body.prepend(overlay);
      var input = document.getElementById('minka-pw');
      var btn = document.getElementById('minka-btn');
      var err = document.getElementById('minka-err');
      var remember = document.getElementById('minka-remember');
      async function attempt() {
        var password = String(input.value || '').trim();
        err.textContent = '';
        if (!password) {
          err.textContent = 'Ievadi paroli';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'P&#257;rbauda...';
        try {
          var res = await fetch(API_BASE + '/api/login', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ password: password })
          });
          var data = await res.json().catch(function(){ return {}; });
          if (!res.ok || !data || !data.token) throw new Error((data && data.error) || 'Login failed');
          setToken(data.token, !!(remember && remember.checked));
          notifyIframeAuth();
          overlay.style.transition = 'opacity 0.3s';
          overlay.style.opacity = '0';
          setTimeout(function(){ overlay.remove(); }, 300);
        } catch (_e) {
          err.textContent = 'Nepareiza parole vai API nav sasniedzams';
          input.value = '';
          input.focus();
        } finally {
          btn.disabled = false;
          btn.textContent = 'Ieiet';
        }
      }
      btn.addEventListener('click', attempt);
      input.addEventListener('keydown', function(e){ if(e.key==='Enter') attempt(); });
      input.focus();
    }, { once: true });
  }

  if (!getToken()) showGate();
  else document.addEventListener('DOMContentLoaded', notifyIframeAuth, { once: true });
})();
</script>
<script>
(function() {
  try {
    var nav = window.navigator || {};
    var mem = Number(nav.deviceMemory || 0);
    var cores = Number(nav.hardwareConcurrency || 0);
    var reduceMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    var lowSpec = reduceMotion || (mem > 0 && mem <= 8) || (cores > 0 && cores <= 4);
    window.__mkPerfProfile = {
      lowSpec: lowSpec,
      reducedMotion: reduceMotion,
      deviceMemory: mem,
      hardwareConcurrency: cores
    };
    if (lowSpec) document.documentElement.classList.add('mk-low-spec');
  } catch (_e) {
    window.__mkPerfProfile = { lowSpec: false, reducedMotion: false, deviceMemory: 0, hardwareConcurrency: 0 };
  }
})();
</script>

<style>
/* ═══ MINKA v11 Shell ═══ */
:root {
  --rh: clamp(142px, 21vh, 170px);        /* fallback radio height */
  --btnbar-h: 52px;
  --calendar-safe-gap: 14px;
  --calendar-bottom: calc(var(--rh) + var(--btnbar-h) + var(--calendar-safe-gap));
  --font: 'Space Grotesk', system-ui, sans-serif;
}
html, body {
  margin: 0; padding: 0; overflow: hidden;
  height: 100vh; width: 100vw;
  background:
    radial-gradient(1200px 700px at 8% 50%, rgba(0,95,255,.22), transparent 55%),
    radial-gradient(1200px 700px at 92% 50%, rgba(0,255,180,.12), transparent 58%),
    linear-gradient(180deg, #040812 0%, #050a14 55%, #060b13 100%);
  transition: background-color 0.5s ease;
}
/* Wallpaper on body */
body.has-wallpaper {
  background-color: #060810;
}
body * { font-family: var(--font), inherit; }

/* When wallpaper active - radio window becomes glass */
html.has-wallpaper-bg #radioWindow {
  background: rgba(6,8,14,0.52) !important;
  backdrop-filter: blur(32px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(32px) saturate(180%) !important;
}
html.mk-low-spec.has-wallpaper-bg #radioWindow {
  background: rgba(6,8,14,0.72) !important;
  backdrop-filter: blur(12px) saturate(125%) !important;
  -webkit-backdrop-filter: blur(12px) saturate(125%) !important;
}
/* MacscapeBg overlay stays but becomes semi-transparent */
html.has-wallpaper-bg #macscapeBg {
  opacity: 0.35;
}

/* Calendar area: fills all space above radio bar */
#calendarEmbed {
  position: fixed;
  top: 6px; left: 6px; right: 6px;
  bottom: calc(var(--calendar-bottom) + 4px);
  z-index: 100;
  border-radius: 28px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(8, 12, 22, 0.18);
  backdrop-filter: blur(30px) saturate(160%);
  -webkit-backdrop-filter: blur(30px) saturate(160%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  transition: bottom .35s cubic-bezier(.4,0,.2,1), background .2s ease, backdrop-filter .2s ease;
  /* GPU compositing layer — avoids layout thrashing on bottom transition */
  will-change: bottom;
  contain: layout style;
}
html.mk-low-spec #calendarEmbed {
  background: rgba(8, 12, 22, 0.34);
  backdrop-filter: blur(10px) saturate(115%);
  -webkit-backdrop-filter: blur(10px) saturate(115%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
}
#calendarEmbed::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01) 18%, rgba(255,255,255,0.02) 100%),
    radial-gradient(120% 90% at 12% 0%, rgba(130,170,255,0.14), transparent 48%),
    radial-gradient(110% 90% at 88% 100%, rgba(255,150,90,0.10), transparent 44%);
  mix-blend-mode: screen;
  opacity: .9;
  z-index: 0;
}
body.radio-hidden #calendarEmbed { bottom: calc(var(--btnbar-h) + 4px); }
body.radio-idle #calendarEmbed { bottom: calc(var(--btnbar-h) + 4px) !important; }

#calendarEmbed iframe {
  position: relative;
  z-index: 1;
  width: 100%; height: 100%;
  border: 0; display: block; background: transparent !important;
  border-radius: inherit;
  color-scheme: normal;

}

/* Radio window: docked at bottom, full width */
#radioWindow {
  position: fixed !important;
  left: 0 !important; right: 0 !important;
  bottom: var(--btnbar-h) !important; top: auto !important; /* leave space for button bar */
  width: 100% !important;
  height: var(--rh);
  max-height: calc(100vh - var(--btnbar-h) - 10px);
  transform: none !important;
  z-index: 500;
  transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .3s;
  transform-origin: bottom center;
  /* Promote to own GPU layer — slide-in/out is transform-only, zero layout cost */
  will-change: transform, opacity;
  contain: layout style;
}
body.radio-hidden #radioWindow {
  transform: translateY(100%) !important;
  opacity: 0;
  pointer-events: none;
}
html.mk-low-spec #calendarEmbed::before,
html.mk-low-spec #macscapeBg,
html.mk-low-spec #bottomBtnBar::before,
html.mk-low-spec #dockShelf::before {
  opacity: .35 !important;
}
html.mk-low-spec #bottomBtnBar,
html.mk-low-spec #dockShelf,
html.mk-low-spec #radioIdleBtn,
html.mk-low-spec #radioToggle,
html.mk-low-spec #statsDocBtn,
html.mk-low-spec #settingsDockBtn,
html.mk-low-spec #nsToggleBtnParent {
  backdrop-filter: blur(10px) saturate(120%) !important;
  -webkit-backdrop-filter: blur(10px) saturate(120%) !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 10px 24px rgba(0,0,0,0.18) !important;
}

/* Radio toggle — inside #bottomBtnBar */
#radioToggle {
  position: static !important;
  z-index: 600;
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px 7px 11px;
  border-radius: 22px;
  background: rgba(6,8,16,0.90);
  border: 1px solid rgba(0,255,136,0.25);
  backdrop-filter: blur(20px);
  color: #f0f4ff; cursor: pointer;
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  box-shadow: 0 4px 24px rgba(0,0,0,.55);
  transition: border-color .2s, box-shadow .2s, bottom .35s cubic-bezier(.4,0,.2,1);
  user-select: none;
}

#radioToggle:hover { border-color: rgba(0,220,100,.7); box-shadow: 0 0 0 1px rgba(0,220,100,.15), 0 0 20px rgba(0,220,100,.35), 0 0 40px rgba(0,220,100,.15); }
#radioToggle:active { transform: scale(.96); }
.rtog-led {
  width: 7px; height: 7px; border-radius: 50%;
  background: #00ff88; box-shadow: 0 0 7px #00ff88;
  flex-shrink: 0; transition: background .3s, box-shadow .3s;
  animation: rledPulse 2s ease-in-out infinite;
}
body.radio-hidden #radioToggle .rtog-led { background: #333; box-shadow: none; animation: none; }
@keyframes rledPulse {
  0%,100% { box-shadow: 0 0 5px #00ff88; }
  50%      { box-shadow: 0 0 12px #00ff88, 0 0 20px rgba(0,255,136,.4); }
}

/* Overlay menus stay on top but not over radio toggle */
#stationOverlay, #mdPresetPanel, #themePanel { z-index: 120000 !important; }
/* Radio toggle ALWAYS visible above overlays */
/* z-index handled by #bottomBtnBar */

/* Radio idle btn - always glows, low CPU (CSS only, no JS) */
#radioIdleBtn {
  cursor: pointer;
  transition: filter .3s ease, transform .3s ease;
}
#radioIdleBtn:hover .rg-idle-icon {
  filter:
    drop-shadow(0 0 8px rgba(0,220,90,0.9))
    drop-shadow(0 0 20px rgba(0,220,90,0.5))
    drop-shadow(0 10px 22px rgba(0,0,0,0.65));
}

/* Minka bubble */


/* Idle icon */
#radioIdleBtn{position:static;background:rgba(6,8,16,0.88);border:1px solid rgba(0,255,136,0.28);backdrop-filter:blur(16px);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:8px 14px;border-radius:24px;gap:7px;color:#e0ffe8;font:700 11px/1 system-ui;letter-spacing:.08em;}
body:not(.radio-idle) #radioIdleBtn{display:none;}
.rg-idle-icon{width:48px;height:48px;display:block;border-radius:12px;filter:drop-shadow(0 0 8px rgba(0,220,90,0.35)) drop-shadow(0 10px 22px rgba(0,0,0,0.65));animation:rgIdlePulse 2.6s ease-in-out infinite;}
@keyframes rgIdlePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
body.radio-idle #radioWindow{display:none!important;}
body.radio-idle #radioToggle{display:none;}
body:not(.radio-idle) #radioIdleBtn{display:none;}

@media (max-width: 760px), (pointer: coarse) {
  #calendarEmbed {
    top: 4px;
    left: 4px;
    right: 4px;
    border-radius: 22px;
    backdrop-filter: blur(18px) saturate(135%);
    -webkit-backdrop-filter: blur(18px) saturate(135%);
  }
  #bottomBtnBar {
    gap: 4px !important;
    padding: 5px 8px !important;
    border-radius: 18px !important;
    backdrop-filter: blur(24px) saturate(145%) !important;
    -webkit-backdrop-filter: blur(24px) saturate(145%) !important;
  }
  #nsToggleBtnParent,
  #statsDocBtn,
  #settingsDockBtn,
  #radioIdleBtn,
  #radioToggle {
    padding: 6px 10px 6px 8px !important;
    gap: 5px !important;
    border-radius: 14px !important;
    font-size: 10px !important;
    box-shadow: 0 2px 10px rgba(0,0,0,.35) !important;
  }
}

@media (max-width: 520px) {
  #dockShelf {
    padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px)) !important;
  }
  #bottomBtnBar {
    width: min(calc(100vw - 12px), 100%) !important;
    justify-content: center !important;
    overflow-x: auto !important;
    scrollbar-width: none !important;
  }
  #bottomBtnBar::-webkit-scrollbar {
    display: none !important;
  }
  .dock-emoji {
    display: none !important;
  }
}
</style>
</head>

<script>
(function(){
  var loader = document.getElementById('mk-app-loader');
  var loaderFill = document.getElementById('mkl-progress-fill');
  var loaderText = document.getElementById('mkl-text');
  var loaderSub = document.getElementById('mkl-subtext');
  var startedAt = Date.now();
  var minVisibleMs = 3200;
  var litClasses = ['lit-warm','lit-cool','lit-purple'];
  var statusSteps = [
    { progress: 18, title: 'Lādē datus…', sub: 'Pieslēdzas pie grafika skata' },
        { progress: 38, title: 'Sak\u0101rto skatu\u2026', sub: 'Ielasa \u0161odienas mai\u0146as un mekl\u0113\u0161anu' },
    { progress: 64, title: 'Sagatavo PWA…', sub: 'Pielāgo kešu, izskatu un shell elementus' },
    { progress: 86, title: 'Gandrīz gatavs…', sub: 'Palaiž interaktīvos elementus' }
  ];
  var statusIndex = 0;
  function paintStatus(step){
    if (!step) return;
    if (loaderFill) loaderFill.style.width = step.progress + '%';
    if (loaderText) loaderText.textContent = step.title;
    if (loaderSub) loaderSub.textContent = step.sub;
  }
  function animWins(){
    if (document.hidden) return;
    var wins = Array.from(document.querySelectorAll('.mkl-win'));
    if(!wins.length) return;
    wins.forEach(function(w){ w.classList.remove('lit-warm','lit-cool','lit-purple'); });
    var count = 3 + Math.floor(Math.random()*4);
    wins.slice().sort(function(){return Math.random()-.5;}).slice(0,count)
      .forEach(function(w){ w.classList.add(litClasses[Math.floor(Math.random()*litClasses.length)]); });
  }
  var winTimer = setInterval(animWins, window.matchMedia('(pointer: coarse)').matches ? 900 : 650);
  var statusTimer = setInterval(function(){
    if (document.hidden) return;
    statusIndex = Math.min(statusIndex + 1, statusSteps.length - 1);
    paintStatus(statusSteps[statusIndex]);
  }, 1100);
  animWins();
  paintStatus(statusSteps[0]);
  var hidden = false;
  function hideLoader(){
    if(hidden) return;
    var delay = Math.max(0, minVisibleMs - (Date.now() - startedAt));
    hidden = true;
    setTimeout(function(){
      clearInterval(winTimer);
      clearInterval(statusTimer);
      if (loaderFill) loaderFill.style.width = '100%';
      if (loaderText) loaderText.textContent = 'Gatavs';
      if (loaderSub) loaderSub.textContent = 'Atveram Minka vidi';
      if(!loader) return;
      loader.style.opacity = '0';
      setTimeout(function(){ loader.style.display = 'none'; }, 920);
    }, delay);
  }
  // Hide only when iframe signals data is fully ready
  window.addEventListener('message', function(e){
    if(e.data && e.data.type === 'minka:appReady') hideLoader();
  });
  // Fallback: hide after 18s regardless
  setTimeout(hideLoader, 18000);
})();
</script>

<script>
/* ──────────────────────────────────────────────
   RADIO LAZY LOAD
────────────────────────────────────────────── */
let _radioScriptsLoaded = false, _radioScriptsLoading = false;

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.async = false;
    s.onload = () => res(src);
    s.onerror = () => rej(src);
    document.head.appendChild(s);
  });
}
async function loadAny(urls) {
  for (const u of urls) { try { await loadScript(u); return true; } catch(e) {} }
  return false;
}
async function loadRadioScripts() {
  if (_radioScriptsLoaded || _radioScriptsLoading) return _radioScriptsLoaded;
  _radioScriptsLoading = true;
  await loadAny(['js/radio.js']);
  await loadAny(['js/radio_extras_v4.js']);
  await loadAny(['js/ambilight.js']);
  _radioScriptsLoaded = true;
  _radioScriptsLoading = false;
  return true;
}

let _milkdropLibsPromise = null;
function ensureMilkdropLibs() {
  if (window.butterchurn && window.butterchurnPresets) return Promise.resolve(true);
  if (_milkdropLibsPromise) return _milkdropLibsPromise;
  _milkdropLibsPromise = (async() => {
    await loadAny(['vendor/butterchurn.min.js','https://cdn.jsdelivr.net/npm/butterchurn@2.6.7/lib/butterchurn.min.js']);
    await loadAny(['vendor/butterchurnPresets.min.js','https://cdn.jsdelivr.net/npm/butterchurn-presets@2.4.7/lib/butterchurnPresets.min.js']);
    return true;
  })();
  return _milkdropLibsPromise;
}
function wireVizLazyMilkdrop() {
  const btn = document.getElementById('vizBtn');
  if (!btn || btn._rgMilkdropHooked) return;
  btn._rgMilkdropHooked = true;
  btn.addEventListener('click', async function(e) {
    if (window.butterchurn && window.butterchurnPresets) return;
    e.stopImmediatePropagation(); e.preventDefault();
    btn.disabled = true;
    try { await ensureMilkdropLibs(); } catch(_e) {}
    btn.disabled = false;
    setTimeout(() => btn.click(), 0);
  }, true);
}
</script>

<script>
/* ──────────────────────────────────────────────
   RADIO TOGGLE & CALENDAR SYNC
────────────────────────────────────────────── */
function toggleRadio() {
  const isHidden = document.body.classList.contains('radio-hidden');
  if (isHidden) {
    // Show radio
    document.body.classList.remove('radio-hidden');
    document.body.classList.remove('radio-idle');
    const rw = document.getElementById('radioWindow');
    if (rw) rw.style.display = '';
    // Update toggle label
    document.getElementById('radioToggleLabel').textContent = 'RADIO';
    document.querySelector('#radioToggle .fas').className = 'fas fa-chevron-down';
    document.querySelector('#radioToggle .fas').style.fontSize = '9px';
    document.querySelector('#radioToggle .fas').style.opacity = '.7';
    syncShellLayout();
  } else {
    // Hide radio
    document.body.classList.add('radio-hidden');
    document.querySelector('#radioToggle .fas').className = 'fas fa-music';
    document.querySelector('#radioToggle .fas').style.fontSize = '11px';
    document.querySelector('#radioToggle .fas').style.opacity = '.85';
    syncShellLayout();
  }
}

function radioIdleClick() {
  const btn = document.getElementById('radioIdleBtn');
  if (!btn || btn._loading) return;
  btn._loading = true;

  const rw = document.getElementById('radioWindow');
  if (rw) rw.style.display = '';
  document.body.classList.remove('radio-idle');
  document.body.classList.remove('radio-hidden');
  syncShellLayout();

  loadRadioScripts().then(function() {
    try { wireVizLazyMilkdrop(); } catch(e) {}
    function tryStart() {
      if (typeof selectStation === 'function' && window.stationsList && window.stationsList.length) {
        btn._loading = false;
        selectStation(window.currentIndex || 0);
        try { window.showAssistantMessage && window.showAssistantMessage(false); } catch(e) {}
      } else {
        setTimeout(tryStart, 100);
      }
    }
    tryStart();
  }).catch(function(err) {
    console.error(err);
    btn._loading = false;
  });
}

// Keep calendar area synced to the actual radio height
let _syncRaf = 0;
function syncShellLayout() {
  cancelAnimationFrame(_syncRaf);
  _syncRaf = requestAnimationFrame(_doSync);
}
function _doSync() {
  const root = document.documentElement;
  const rw = document.getElementById('radioWindow');
  const iframe = document.getElementById('calIframe');
  // Measure dock shelf height (includes padding + safe-area) for accurate layout
  const dockShelf = document.getElementById('dockShelf');
  const dockBar   = document.getElementById('bottomBtnBar');
  const btnH = (dockShelf && dockShelf.offsetHeight) ? dockShelf.offsetHeight
             : (dockBar   && dockBar.offsetHeight)   ? dockBar.offsetHeight + 20
             : 52;
  const radioVisible = !!rw && !document.body.classList.contains('radio-hidden') && !document.body.classList.contains('radio-idle') && rw.style.display !== 'none';
  const radioH = radioVisible ? Math.max(0, Math.round(rw.getBoundingClientRect().height || rw.offsetHeight || 0)) : 0;
  root.style.setProperty('--btnbar-h', btnH + 'px');
  const safeGap = radioVisible ? 10 : 6;
  root.style.setProperty('--calendar-safe-gap', safeGap + 'px');
  root.style.setProperty('--calendar-bottom', (radioH + btnH + safeGap) + 'px');
  if (iframe && iframe.contentWindow) {
    try { iframe.contentWindow.postMessage({ type: 'hostLayoutChanged', radioVisible, radioHeight: radioH, buttonBarHeight: btnH }, '*'); } catch(e) {}
  }
}

// Initialize Alpine app method
function initApp() {
  // Strip iframe background
  const iframe = document.getElementById('calIframe');
  function stripBg() {
    try {
      const d = iframe.contentDocument;
      if (!d) return;
      if (d.documentElement) {
        d.documentElement.style.background = 'transparent';
        d.documentElement.style.backgroundColor = 'transparent';
      }
      if (d.body) {
        d.body.style.background = 'transparent';
        d.body.style.backgroundColor = 'transparent';
      }
      // macscapeBg kept visible — orb gradients show through transparent glass
    } catch(e) {}
  }
  iframe.addEventListener('load', () => { stripBg(); setTimeout(stripBg, 200); });
  setTimeout(stripBg, 400);

  // Keep shell responsive to viewport and radio size
  window.addEventListener('resize', () => syncShellLayout());
  const rw = document.getElementById('radioWindow');
  if (rw && 'ResizeObserver' in window) {
    const ro = new ResizeObserver(() => syncShellLayout());
    ro.observe(rw);
  }
  const cal = document.getElementById('calIframe');
  if (cal) cal.addEventListener('load', () => setTimeout(syncShellLayout, 80));
  setTimeout(syncShellLayout, 80);

  // Keyboard shortcut: Space = play, arrows = next/prev, M = mute
  document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
    if (e.code === 'Space' && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      const btn = document.getElementById('playBtn');
      if (btn) btn.click();
    }
    if (e.key === 'ArrowRight' && !e.ctrlKey) { e.preventDefault(); if (typeof playNext === 'function') playNext(); }
    if (e.key === 'ArrowLeft' && !e.ctrlKey) { e.preventDefault(); if (typeof playPrev === 'function') playPrev(); }
  });
}

// When radio scripts load, dock assistant to side
window.addEventListener('DOMContentLoaded', () => {
  document.body.classList.add('radio-idle');
  syncShellLayout();
});
</script>

<script>
var _nsOpen = false;

function openStatsFromDock() {
  var iframe = document.getElementById("calIframe");
  if (!iframe || !iframe.contentWindow) return;
  iframe.contentWindow.postMessage({ type: "mk_open_stats" }, "*");
}

function openSettingsFromDock() {
  var iframe = document.getElementById("calIframe");
  if (!iframe || !iframe.contentWindow) return;
  iframe.contentWindow.postMessage({ type: "mk_open_settings" }, "*");
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'mk_stats_closed') {
    var btn = document.getElementById('statsDocBtn');
    if (btn) btn.classList.remove('stats-open');
  } else if (e.data && e.data.type === 'mk_stats_opened') {
    var btn = document.getElementById('statsDocBtn');
    if (btn) btn.classList.add('stats-open');
  } else if (e.data && e.data.type === 'mk_settings_closed') {
    var sbtn = document.getElementById('settingsDockBtn');
    if (sbtn) sbtn.classList.remove('settings-open');
  } else if (e.data && e.data.type === 'mk_settings_opened') {
    var sbtn = document.getElementById('settingsDockBtn');
    if (sbtn) sbtn.classList.add('settings-open');
  }
});

function toggleNsFromParent() {
  _nsOpen = !_nsOpen;
  const iframe = document.getElementById('calIframe');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage({ type: 'toggleNs', open: _nsOpen }, '*');
  }
  const btn = document.getElementById('nsToggleBtnParent');
  const led = document.getElementById('nsLedParent');
  if (_nsOpen) {
    btn.style.borderColor = 'rgba(100,140,255,.65)';
    btn.style.boxShadow = '0 4px 28px rgba(100,140,255,.35)';
    led.style.background = '#fff';
    led.style.boxShadow = '0 0 8px #fff';
    led.style.animation = 'none';
  } else {
    btn.style.borderColor = '';
    btn.style.boxShadow = '';
    led.style.background = '#6488ff';
    led.style.boxShadow = '0 0 7px #6488ff';
    led.style.animation = 'rledPulse 2.5s ease-in-out infinite';
  }
}
// Listen for NS close from iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'nsClosed') {
    _nsOpen = false;
    const btn = document.getElementById('nsToggleBtnParent');
    const led = document.getElementById('nsLedParent');
    if (btn) { btn.style.borderColor = ''; btn.style.boxShadow = ''; }
    if (led) { led.style.background = '#6488ff'; led.style.boxShadow = '0 0 7px #6488ff'; led.style.animation = 'rledPulse 2.5s ease-in-out infinite'; }
  }
});
</script>

<script>
/* Parent sound system for NAKTS/RADIO buttons */
(function(){
  let _ctx=null;
  function ctx(){ if(!_ctx)try{_ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return _ctx; }
  function blip(freq,dur,vol){
    const c=ctx();if(!c)return;
    try{const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,c.currentTime);
    g.gain.linearRampToValueAtTime(vol||0.05,c.currentTime+0.008);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.start(c.currentTime);o.stop(c.currentTime+dur+0.01);}catch(e){}
  }
  document.addEventListener('click',function(e){
    const b=e.target.closest('button');
    if(!b)return;
    if(b.id==='nsToggleBtnParent') blip(420,0.12,0.04);
    else if(b.id==='radioToggle'||b.id==='radioIdleBtn') blip(380,0.10,0.04);
  },true);
})();
</script>

<script>
if ('serviceWorker' in navigator && /^https?:$/i.test(location.protocol)) {
  const MINKA_APP_VERSION = '2026.03.22.2';
  const MINKA_VERSION_KEY = 'minka_app_version';
  const MINKA_RELOAD_KEY = 'minka_sw_reloading';
  function clearMinkaRuntimeCaches() {
    try {
      localStorage.removeItem('minka_schedule_cache_v2');
      localStorage.removeItem('minka_schedule_cache_ts_v2');
      localStorage.removeItem('minka_emoji_v1');
    } catch (e) {}
    return caches.keys().then(keys => Promise.all(keys.map(key => caches.delete(key)))).catch(() => {});
  }
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(async (r) => {
        try {
          const prev = localStorage.getItem(MINKA_VERSION_KEY);
          if (prev !== MINKA_APP_VERSION) {
            await clearMinkaRuntimeCaches();
            localStorage.setItem(MINKA_VERSION_KEY, MINKA_APP_VERSION);
            await r.update();
          }
        } catch (e) {}

        if (r.waiting) r.waiting.postMessage({ type: 'SKIP_WAITING' });
        r.addEventListener('updatefound', () => {
          const next = r.installing;
          if (!next) return;
          next.addEventListener('statechange', () => {
            if (next.state === 'installed' && navigator.serviceWorker.controller) {
              next.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });

        navigator.serviceWorker.addEventListener('controllerchange', () => {
          try {
            if (sessionStorage.getItem(MINKA_RELOAD_KEY) === MINKA_APP_VERSION) return;
            sessionStorage.setItem(MINKA_RELOAD_KEY, MINKA_APP_VERSION);
          } catch (e) {}
          location.reload();
        });

        console.log('Minka SW ok');
      })
      .catch(e => console.log('SW error:', e));
  });
}
</script>




<script>
/* ── Wallpaper: apply to parent body so it shows behind transparent iframe ── */
var _wpEl = null;

function applyWallpaperToParent(wallpaper, bodyBase) {
  if (wallpaper) {
    // Set wallpaper directly as body background — overrides CSS gradient
    document.body.style.backgroundImage = "url('" + wallpaper + "')";
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
    document.body.style.backgroundAttachment = 'fixed';
    document.body.style.backgroundColor = bodyBase || '#060810';
    document.documentElement.classList.add('has-wallpaper-bg');
  } else {
    // Restore original CSS gradient background
    document.body.style.backgroundImage = '';
    document.body.style.backgroundSize = '';
    document.body.style.backgroundPosition = '';
    document.body.style.backgroundAttachment = '';
    document.body.style.backgroundColor = '';
    document.body.style.background = '';
    document.documentElement.classList.remove('has-wallpaper-bg');
  }
}

window.__lastWallpaper = null;
window.__lastWallpaperBase = null;

window.addEventListener('message', function(e) {
  if (!e.data) return;

  if (e.data.type === 'mk_wallpaper') {
    window.__lastWallpaper = e.data.wallpaper || null;
    window.__lastWallpaperBase = e.data.bodyBase || '#06070b';
    applyWallpaperToParent(window.__lastWallpaper, window.__lastWallpaperBase);
  }

  if (e.data.type === 'mk_glass_opacity') {
    var go = parseFloat(e.data.opacity);
    if (isNaN(go)) return;
    setCalGlass(go);
  }
});

// Control calendar glass opacity from parent
function setCalGlass(opacity) {
  opacity = Math.max(0.12, Math.min(0.95, parseFloat(opacity) || 0.58));
  var shell = document.getElementById('calendarEmbed');
  var shellAlpha = (0.10 + opacity * 0.22).toFixed(3);
  var shellBorder = (0.08 + opacity * 0.10).toFixed(3);
  var shellBlur = Math.round(16 + opacity * 24);
  if (shell) {
    shell.style.background = 'rgba(8, 12, 22, ' + shellAlpha + ')';
    shell.style.borderColor = 'rgba(255,255,255,' + shellBorder + ')';
    shell.style.backdropFilter = 'blur(' + shellBlur + 'px) saturate(160%)';
    shell.style.webkitBackdropFilter = 'blur(' + shellBlur + 'px) saturate(160%)';
  }
  var iframe = document.getElementById('calIframe');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage({type: 'mk_glass_opacity', opacity: opacity}, '*');
  }
  try { localStorage.setItem('mk_cal_glass', String(opacity)); } catch(e) {}
}

// Restore glass on load
window.addEventListener('load', function() {
  var saved = null;
  try { saved = localStorage.getItem('mk_cal_glass'); } catch(e) {}
  var v = saved !== null ? parseFloat(saved) : 0.58;
  var iframe = document.getElementById('calIframe');
  if (iframe) {
    iframe.addEventListener('load', function() {
      setTimeout(function() { setCalGlass(v); }, 400);
    });
  }
  setTimeout(function(){ setCalGlass(v); }, 250);
});
</script>
