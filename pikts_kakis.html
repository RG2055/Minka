*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui,sans-serif;overflow:hidden;}
body.embed{
  background:#090910;
  width:100vw;
  height:100vh;
  min-height:0;
  display:block;
  overflow:hidden;
}
body.nostats{
  background:transparent;
}
#scene-wrap{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}
body.embed #scene-wrap{
  display:flex;
}
#scene{position:relative;width:500px;height:420px;background:#090910;border-radius:20px;overflow:hidden;user-select:none;transform-origin:center center;}
body.embed #scene{box-shadow:none;background:#090910;flex-shrink:0;}
#light-floor{position:absolute;bottom:0;left:0;right:0;height:200px;background:radial-gradient(ellipse 55% 60% at 28% 100%,rgba(245,158,11,0.25) 0%,transparent 70%);opacity:0;pointer-events:none;transition:opacity 0.6s ease;}
#light-wall{position:absolute;top:0;left:0;width:45%;height:75%;background:radial-gradient(ellipse 80% 70% at 10% 30%,rgba(245,158,11,0.1) 0%,transparent 65%);opacity:0;pointer-events:none;transition:opacity 0.6s ease;}
#scene.lit #light-floor,#scene.lit #light-wall{opacity:1;}
#shock-overlay{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;z-index:100;border-radius:20px;}

/* catEl bottom=-55 so cat sits lower, paw aligns with switch */
#cat-lottie{
  position:absolute;
  bottom:-55px; right:-350px;
  width:300px; height:250px;
  transform:scaleX(-1);
  z-index:30; pointer-events:none;
}

/* Pozīcijas:
   .visible   right=140  — kaķis redzams, atpūšas
   .at-switch right=259  — ķepa pieskaras slēdzim (x≈99, y≈386)
   .at-hose   right=250  — mute pieskaras vadam (x≈84, y≈307)
*/
#cat-lottie.slide-in   { transition:right 0.55s cubic-bezier(0.22,1,0.36,1); }
#cat-lottie.slide-out  { transition:right 0.45s cubic-bezier(0.4,0,1,1); }
#cat-lottie.slide-lamp { transition:right 0.65s cubic-bezier(0.4,0,0.2,1); }

/* Burbulītis virs kaķa galvas
   Galva scene ≈ (194, 296) kad right=140
   Burbulītis ≈ top=236, left=170 */
#bubble{
  position:absolute;
  left:170px; top:236px;
  background:#fff; color:#111; font-size:13px; font-weight:500;
  padding:7px 12px; border-radius:10px; white-space:nowrap;
  opacity:0; transform:translateY(6px) scale(0.92);
  transition:opacity 0.28s,transform 0.28s;
  pointer-events:none; z-index:55;
}
#bubble::after{content:'';position:absolute;bottom:-8px;left:20px;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #fff;}
#bubble.show{opacity:1;transform:translateY(0) scale(1);}

#threat-bubble{
  position:absolute;
  left:160px; top:236px;
  background:#c0392b; color:#fff; font-size:12px; font-weight:500;
  padding:6px 11px; border-radius:10px; white-space:nowrap;
  opacity:0; transform:translateY(6px) scale(0.92);
  transition:opacity 0.25s,transform 0.25s;
  pointer-events:none; z-index:55;
}
#threat-bubble::after{content:'';position:absolute;bottom:-8px;left:20px;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #c0392b;}
#threat-bubble.show{opacity:1;transform:translateY(0) scale(1);}

#mouse-wrap{position:absolute;bottom:0;left:-170px;width:140px;height:115px;transition:left 0.7s cubic-bezier(0.22,1,0.36,1);z-index:40;}
#mbubble{position:absolute;top:0;left:6px;background:#fff;color:#111;font-size:11px;font-weight:500;padding:5px 9px;border-radius:8px;white-space:nowrap;opacity:0;transform:translateY(5px) scale(0.92);transition:opacity 0.25s,transform 0.25s;pointer-events:none;}
#mbubble::after{content:'';position:absolute;bottom:-6px;left:14px;border:6px solid transparent;border-top-color:#fff;}
#mbubble.show{opacity:1;transform:translateY(0) scale(1);}
@keyframes wrench-bob{0%,100%{transform:rotate(-18deg) translateY(0)}50%{transform:rotate(18deg) translateY(-5px)}}
#mouse-wrap.working #wrench{animation:wrench-bob 0.28s ease-in-out infinite;}

.zzz{position:absolute;font-size:14px;color:rgba(180,180,220,0.75);pointer-events:none;z-index:35;animation:zzz-float 2.2s ease-out forwards;}
@keyframes zzz-float{0%{opacity:0;transform:translateY(0) scale(0.6)}25%{opacity:1}100%{opacity:0;transform:translateY(-44px) scale(1.1)}}
.spark{position:absolute;border-radius:50%;pointer-events:none;z-index:80;animation:sparkfly 0.55s ease-out forwards;}
@keyframes sparkfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0.1)}}
@keyframes fix-flash{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
#fix-burst{position:absolute;pointer-events:none;z-index:75;opacity:0;font-size:22px;}
#fix-burst.pop{animation:fix-flash 0.7s ease forwards;}
#sw-hit{position:absolute;bottom:0;left:14px;width:210px;height:320px;cursor:pointer;z-index:50;border-radius:16px;}
body.nostats #sw-hit::after{display:none;}
@keyframes swPulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
@keyframes shaking{
  0%,100%{translate:0 0}
  20%{translate:-5px 0}
  40%{translate:5px 0}
  60%{translate:-3px 0}
  80%{translate:3px 0}
}
#scene.shaking{animation:shaking 0.3s ease}
</style>

// Precīzās pozīcijas (aprēķinātas no Lottie canvas koordinātēm):
// right=140  — kaķis atpūšas ekrānā, ķepa nav pie slēdža
// right=259  — ķepas gals (canvas x=708) precīzi pie slēdža (scene x=99, y≈386)
// right=250  — mute (canvas x=828) precīzi pie vada (scene x=84, y≈307)
// HIDDEN     — right=-350

anim=lottie.loadAnimation({container:catEl,renderer:'svg',loop:false,autoplay:false,animationData:CAT_DATA});
anim.addEventListener('DOMLoaded',()=>{ playLoop(SEG.IDLE); });

function playLoop(seg){ if(!anim)return; anim.setLoop(true); anim.playSegments([seg],true); anim.play(); }
function playOnce(seg){ if(!anim)return; anim.setLoop(false); anim.playSegments([seg],true); anim.play(); }

// Katras pozīcijas pāreja
function catSlide(right, speed, ease){
  catEl.style.transition = `right ${speed}ms ${ease||'cubic-bezier(0.22,1,0.36,1)'}`;
  catEl.style.right = right + 'px';
}
function catReset(){
  catEl.style.transition='none';
  catEl.style.right='-350px';
  void catEl.offsetWidth;
}

// Burbulīša pozīcija — dinamiska, sekojot kaķa galvai
// Galva pie right=140: scene (194, 296), bubble top = 296-60 = 236
// Kad kaķis pārvietojas, burbulīša x mainās proporcionāli
function updateBubblePos(el){
  const curRight = parseFloat(catEl.style.right) || -350;
  if(curRight < -200) return; // ārpus ekrāna
  // Galvas scene_x = (500 - curRight - 300) + (300 - 828*scale)
  const scale = 300/1495;
  const catLeft = 500 - curRight - 300;
  const headLocalX = 300 - 828*scale;
  const headSceneX = catLeft + headLocalX;
  el.style.left = Math.max(8, Math.min(headSceneX - 15, 490 - el.offsetWidth)) + 'px';
}

function showBub(el, txt, bg, col){
  el.textContent = txt;
  el.style.background = bg||'#fff';
  el.style.color = col||'#111';
  updateBubblePos(el);
  el.classList.add('show');
}
function hideBub(el){ el.classList.remove('show'); }

// Pēc katras pozīcijas maiņas — atjaunojam burbulīša x
function slideThen(right, speed, ease, delay){
  return new Promise(r=>{
    catSlide(right, speed, ease);
    setTimeout(()=>{ updateBubblePos(bub); updateBubblePos(thr); r(); }, delay||speed);
  });
}

function setLit(on){
  try{window.parent.postMessage({type:'kakisLit',on:on},'*');}catch(_e){}
  if(on){
    scene.classList.add('lit');
    shade.setAttribute('fill','#a06010');shade.setAttribute('stroke','#c07820');
    shadeRim.setAttribute('fill','#c07010');shadeInner.setAttribute('fill','rgba(255,200,60,0.3)');
    bulb.setAttribute('fill','#fffacc');bulbGlow.setAttribute('fill','rgba(255,230,100,0.5)');
    bulb.style.filter='none';cone.setAttribute('opacity','1');
    swRing.setAttribute('fill','#3a2800');swRing.setAttribute('stroke','#f59e0b');
    swDot.setAttribute('fill','#f59e0b');swLed.setAttribute('fill','#f59e0b');
    swLed.style.filter='none';
  } else {
    scene.classList.remove('lit');
    shade.setAttribute('fill','#202030');shade.setAttribute('stroke','#2a2a3e');
    shadeRim.setAttribute('fill','#1a1a28');shadeInner.setAttribute('fill','#141420');
    bulb.setAttribute('fill','#161620');bulb.style.filter='none';
    bulbGlow.setAttribute('fill','rgba(255,230,100,0)');cone.setAttribute('opacity','0');
    swRing.setAttribute('fill','#252535');swRing.setAttribute('stroke','#303044');
    swDot.setAttribute('fill','#333348');swLed.setAttribute('fill','#2a2a3a');swLed.style.filter='none';
  }
}

  stopZzz();
  zzzInt=setInterval(()=>{
    const scale=300/1495;
    const curRight=parseFloat(catEl.style.right)||0;
    if(curRight < -200) return;
    const catLeft=500-curRight-300;

let activeCatAudio = null;
let activeFxAudio = null;

function playEmbeddedAudio(src, volume=0.92, channel='fx'){
  try{
    if(!src) return;
    const key = channel === 'cat' ? 'activeCatAudio' : 'activeFxAudio';
    const current = channel === 'cat' ? activeCatAudio : activeFxAudio;
    if(current){
      try{ current.pause(); }catch(_e){}
      try{ current.currentTime = 0; }catch(_e){}
    }
    const a = new Audio(src);
    a.preload = 'auto';
    a.volume = volume;
    if(channel === 'cat') activeCatAudio = a; else activeFxAudio = a;
    const playPromise = a.play();
    if(playPromise && typeof playPromise.catch === 'function') playPromise.catch(()=>{});
  }catch(_e){}
}

function playRandomEmbeddedCatSound(){
  try{
    const pool = EMBEDDED_CAT_SOUNDS;
    if(!pool || !pool.length) return;
    const src = pool[Math.floor(Math.random() * pool.length)];
    playEmbeddedAudio(src, 0.92, 'cat');
  }catch(_e){}
}
const catCryAudio = (() => {
  try{
    return null; /* disabled sample fallback; use synthesized angry cat sound */
    const a = new Audio('data/cat-meow.mp3');
    a.preload = 'auto';
    a.volume = 0.74;
    return a;
  }catch(_e){
    return null;
  }
})();

function playSwitchClick(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx) return;
    if(!audioCtx) audioCtx=new Ctx();
    if(audioCtx.state==='suspended') audioCtx.resume();

    const now=audioCtx.currentTime;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    const filter=audioCtx.createBiquadFilter();

    osc.type='triangle';
    osc.frequency.setValueAtTime(920, now);
    osc.frequency.exponentialRampToValueAtTime(540, now+0.045);

    filter.type='lowpass';
    filter.frequency.setValueAtTime(1800, now);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.06, now+0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+0.075);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now+0.08);
  }catch(_e){}
}

function playCatHissAndGrowl(step=0){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx) return;
    if(!audioCtx) audioCtx=new Ctx();
    if(audioCtx.state==='suspended') audioCtx.resume();

    const duration = 2.0;
    const now = audioCtx.currentTime + step*0.06;

    const hissMaster = audioCtx.createGain();
    hissMaster.gain.setValueAtTime(0.0001, now);
    hissMaster.gain.linearRampToValueAtTime(0.9, now + 0.08);
    hissMaster.gain.exponentialRampToValueAtTime(0.02, now + 1.5);
    hissMaster.connect(audioCtx.destination);

    const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      const t = i / bufferSize;
      const env = t < 0.7 ? 1 : Math.max(0.15, 1 - ((t - 0.7) / 0.3));
      data[i] = (Math.random() * 2 - 1) * env;
    }

    const noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = buffer;

    const hissFilter = audioCtx.createBiquadFilter();
    hissFilter.type = 'highpass';
    hissFilter.frequency.setValueAtTime(4000, now);

    noiseSource.connect(hissFilter);
    hissFilter.connect(hissMaster);
    noiseSource.start(now);
    noiseSource.stop(now + duration);

    const growlOsc = audioCtx.createOscillator();
    growlOsc.type = 'sawtooth';
    growlOsc.frequency.setValueAtTime(45, now);
    growlOsc.frequency.linearRampToValueAtTime(90, now + duration);

    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(30, now);

    const lfoGain = audioCtx.createGain();
    lfoGain.gain.setValueAtTime(25, now);
    lfo.connect(lfoGain);
    lfoGain.connect(growlOsc.frequency);

    const growlFilter = audioCtx.createBiquadFilter();
    growlFilter.type = 'lowpass';
    growlFilter.frequency.setValueAtTime(600, now);

    const growlGain = audioCtx.createGain();
    growlGain.gain.setValueAtTime(0.0001, now);
    growlGain.gain.linearRampToValueAtTime(0.8, now + 0.2);
    growlGain.gain.exponentialRampToValueAtTime(0.02, now + duration);

    growlOsc.connect(growlFilter);
    growlFilter.connect(growlGain);
    growlGain.connect(audioCtx.destination);

    lfo.start(now);
    growlOsc.start(now);
    lfo.stop(now + duration);
    growlOsc.stop(now + duration);
  }catch(_e){}
}

function fitEmbedScene(){
  if(!_embedMode) return;
  const wrap = document.getElementById('scene-wrap');
  const wW = (wrap && wrap.clientWidth)  || window.innerWidth  || 500;
  const wH = (wrap && wrap.clientHeight) || window.innerHeight || 420;
  if(_fillMode){
    const sx = Math.max(0.1, wW / 500);
    const sy = Math.max(0.1, wH / 420);
    scene.style.transform = 'scale(' + sx + ',' + sy + ')';
  } else {
    const scale = Math.min(wW / 500, wH / 420);
    scene.style.transform = 'scale(' + Math.max(0.1, scale) + ')';
  }
  scene.style.transformOrigin = 'center center';
}

if(_embedMode){
  document.body.classList.add('embed');
  window.addEventListener('resize', fitEmbedScene, { passive:true });
  setTimeout(fitEmbedScene, 0);
}
if(_noStatsMode){
  document.body.classList.add('nostats');
}

async function normalCycle(){
  // Ienāk
  catSlide(140, 550);
  playOnce(SEG.APPROACH);
  await wait(450);
  showBub(bub, wakeMsgs[Math.min(count-1,wakeMsgs.length-1)]);

  await wait(1200);
  // Slīd tieši pie slēdža — ķepa pieskaras
  await slideThen(259, 600, 'cubic-bezier(0.4,0,0.2,1)', 600);
  playOnce(SEG.STRIKE);
  await wait(300);
  setLit(false);
  scene.classList.add('shaking'); await wait(320); scene.classList.remove('shaking');
  await wait(500);
  hideBub(bub);
  showBub(thr, threatMsgs[Math.min(count-1,threatMsgs.length-1)], '#c0392b', '#fff');

  startZzz();

  playLoop(SEG.IDLE);
  catSlide(-350, 450, 'cubic-bezier(0.4,0,1,1)');
  await wait(500); catReset(); busy=false;
}

async function biteCycle(){
  // Ienāk
  catSlide(140, 550);
  playOnce(SEG.APPROACH);

  showBub(bub,'Labi... tu to prasīji!');

}

function handleSwitch(){
  if(busy||locked)return; busy=true; count++;
  playSwitchClick();
  playRandomEmbeddedCatSound();
  if(count>=5){locked=true;setLit(true);biteCycle();return;}
  setLit(true); normalCycle();
}

function mouseIn(){
  mw.style.transition='none';mw.style.left='-170px';void mw.offsetWidth;
  mw.style.transition='left 0.7s cubic-bezier(0.22,1,0.36,1)';
  mb.textContent='Salabot!';mb.classList.remove('show');mw.classList.remove('working');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{mw.style.left='28px';setTimeout(()=>mb.classList.add('show'),300);}));
}
function mouseOut(cb){mb.classList.remove('show');mw.classList.remove('working');setTimeout(()=>{mw.style.left='-170px';setTimeout(cb,750);},200);}

  mouseIn();await wait(1000);mb.textContent='Tūlīt...';mw.classList.add('working');
